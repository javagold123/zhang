spring:
  application:
    name: backend-labor
  datasource:
    url: jdbc:mysql://localhost:3306/laboratory_reservation?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never

server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# JWT
jwt:
  secret: labor-jwt-secret-key-at-least-256-bits-for-hs256
  expiration-ms: 604800000